<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌸 FLOWER Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #fff7fb, #ffeaf4);
  margin: 0;
  padding: 12px;
}

h1 {
  text-align: center;
  color: #d63384;
  margin-bottom: 12px;
  font-size: 24px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  box-sizing: border-box;
  font-size: 16px;
}

button {
  background: #d63384;
  color: white;
  border: none;
  font-weight: bold;
}

.dashboard {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}

.stat {
  width: 180px;
  background: white;
  padding: 10px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  font-size: 14px;
}

.stat b {
  display: block;
  color: #d63384;
  font-size: 18px;
}

.flower-card {
  background: white;
  border-radius: 16px;
  padding: 12px;
  margin-top: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.flower-top {
  display: flex;
  gap: 12px;
  align-items: center;
}

.flower-top img {
  width: 85px;
  height: 85px;
  object-fit: cover;
  border-radius: 14px;
}

.flower-info h3 {
  margin: 0;
  color: #d63384;
}

.flower-info p {
  margin: 4px 0;
  color: #666;
  font-size: 14px;
}

.member-list {
  margin-top: 10px;
  font-size: 14px;
  color: #444;
  line-height: 1.6;
}

.loading {
  text-align: center;
  color: #d63384;
  display: none;
}
</style>
</head>
<body>

<h1>🌸 FLOWER Dashboard 🌸</h1>

<input id="searchInput" placeholder="🔍 Tìm kiếm hoa hoặc hội viên">

<div class="dashboard">
  <div class="stat">Hội viên<b id="totalMembers">0</b></div>
</div>

<input id="flowerName" placeholder="Nhập tên hoa">
<input type="file" id="flowerImage" accept="image/*">
<button onclick="addFlower()">➕ Thêm loại hoa</button>

<div class="loading" id="loading">⏳ Đang tải ảnh...</div>

<div id="flowers"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  arrayUnion,
  arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCGhFuv8bAVvKxhOQLuTnXQS51x3k0DAM",
  authDomain: "quan-ly-hoa-hoi.firebaseapp.com",
  projectId: "quan-ly-hoa-hoi",
  storageBucket: "quan-ly-hoa-hoi.firebasestorage.app",
  messagingSenderId: "954370139081",
  appId: "1:954370139081:web:1c10ba7d6ff8109c54be18"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = localStorage.getItem("flowerUser");

if (!currentUser) {
  currentUser = prompt("Nhập tên hội viên của bạn:");
  if (currentUser) {
    localStorage.setItem("flowerUser", currentUser);
  }
}

document.getElementById("searchInput").addEventListener("input", loadFlowers);

async function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = 600 / img.width;

      canvas.width = 600;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

async function uploadToCloudinary(file) {
  const compressed = await compressImage(file);

  const formData = new FormData();
  formData.append("file", compressed);
  formData.append("upload_preset", "hoa_upload");

  const response = await fetch(
    "https://api.cloudinary.com/v1_1/dwoznij8g/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await response.json();
  return data.secure_url;
}

window.addFlower = async function () {
  const name = flowerName.value.trim();
  const file = flowerImage.files[0];

  if (!name || !file) {
    alert("Nhập tên hoa + chọn ảnh");
    return;
  }

  loading.style.display = "block";

  const imageUrl = await uploadToCloudinary(file);

  await addDoc(collection(db, "flowers"), {
    name,
    image: imageUrl,
    members: []
  });

  flowerName.value = "";
  flowerImage.value = "";
  loading.style.display = "none";

  loadFlowers();
};

window.joinFlower = async function(id) {
  await updateDoc(doc(db, "flowers", id), {
    members: arrayUnion(currentUser)
  });

  loadFlowers();
};

window.leaveFlower = async function(id) {
  await updateDoc(doc(db, "flowers", id), {
    members: arrayRemove(currentUser)
  });

  loadFlowers();
};

async function loadFlowers() {
  flowers.innerHTML = "";

  const search = searchInput.value.toLowerCase().trim();
  const snapshot = await getDocs(collection(db, "flowers"));

  let allMembers = new Set();

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    const memberMatch = (data.members || []).some(member =>
      member.toLowerCase().includes(search)
    );

    if (
      search &&
      !data.name.toLowerCase().includes(search) &&
      !memberMatch
    ) return;

    (data.members || []).forEach(m => allMembers.add(m));

    const count = (data.members || []).length;

    const div = document.createElement("div");
    div.className = "flower-card";

    div.innerHTML = `
      <div class="flower-top">
        <img src="${data.image}">
        <div class="flower-info">
          <h3>${data.name}</h3>
          <p>${count} hội viên đang có</p>
        </div>
      </div>

      <button onclick="joinFlower('${docSnap.id}')">🌸 Tôi có hoa này</button>
      <button onclick="leaveFlower('${docSnap.id}')">❌ Xóa tên tôi</button>

      <div class="member-list">
        ${(data.members || []).join(" • ") || "Chưa có ai"}
      </div>
    `;

    flowers.appendChild(div);
  });

  totalMembers.textContent = allMembers.size;
}

loadFlowers();
</script>

</body>
</html>
