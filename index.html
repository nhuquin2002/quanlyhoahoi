<html lang="vi">
<head>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #fff8fc 0%, #ffeef7 100%);
  margin: 0;
  padding: 16px;
}

h1 {
  text-align: center;
  color: #d63384;
  font-size: 28px;
  margin-bottom: 18px;
  font-weight: 800;
}

input,
select {
  width: 100%;
  padding: 14px 16px;
  margin: 8px 0;
  border-radius: 18px;
  border: 1px solid #f2d6e5;
  background: rgba(255,255,255,0.95);
  box-sizing: border-box;
  font-size: 16px;
  box-shadow: 0 4px 18px rgba(214, 51, 132, 0.06);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #d63384, #ff6bb3);
  color: white;
  font-size: 16px;
  font-weight: 800;
  box-shadow: 0 8px 18px rgba(214, 51, 132, 0.2);
}

.dashboard {
  display: flex;
  justify-content: center;
  margin: 14px 0 18px;
}

.stat {
  width: 170px;
  background: rgba(255,255,255,0.95);
  padding: 14px;
  border-radius: 22px;
  text-align: center;
  box-shadow: 0 10px 24px rgba(214, 51, 132, 0.12);
  font-size: 18px;
  font-weight: 600;
}

.stat b {
  display: block;
  margin-top: 4px;
  color: #d63384;
  font-size: 28px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}

.flower-card {
  width: 110px;
  background: rgba(255,255,255,0.96);
  border-radius: 18px;
  padding: 8px;

  flex-shrink: 0;
}

.flower-card:active {
  transform: scale(0.97);
}

.flower-card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 14px;
}

.flower-card h3 {
  text-align: center;
  color: #d63384;
  font-size: 13px;
  margin: 8px 2px 0;
  font-weight: 700;
  line-height: 1.25;
}

.flower-count {

  font-size: 12px;
  color: #777;
  margin-top: 4px;
  font-weight: 600;
}

.category-title {
  font-size: 20px;
  font-weight: 800;
  color: #d63384;

  display: block;

}

.loading {
  text-align: center;
  color: #d63384;
  margin-top: 10px;
  font-weight: 600;
  display: none;
}

.popup {
  display: none;

  inset: 0;
  background: rgba(0,0,0,0.45);

  align-items: center;

}

#categoryPopup {
  z-index: 2000;
}

.popup-box {
  background: linear-gradient(180deg, #ffffff 0%, #fff3fa 100%);
  width: 100%;
  max-width: 390px;
  max-height: 85vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: 28px;
  padding: 18px;
  position: relative;
  animation: popupIn 0.25s ease;
  box-shadow: 0 20px 60px rgba(214, 51, 132, 0.25);
  border: 2px solid rgba(255,255,255,0.8);
}

.popup-box img {
  width: 100%;
  border-radius: 20px;
  max-height: 250px;
  object-fit: cover;
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

.popup-box h2 {
  text-align: center;
  color: #d63384;
  margin-top: 14px;
  font-size: 24px;
  font-weight: 900;
  text-shadow: 0 2px 8px rgba(214, 51, 132, 0.15);
}

.close-btn {
  position: absolute;
  right: 18px;
  top: 14px;
  font-size: 24px;
  cursor: pointer;
  color: #999;
}

#popupMembers {
  margin-top: 16px;
  line-height: 1.8;
  color: #444;
  text-align: center;
  max-height: 180px;
  overflow-y: auto;
  background: rgba(255,255,255,0.8);
  border-radius: 16px;
  padding: 12px;
  font-weight: 600;
}

.menu-btn {
  position: fixed;
  top: 20px;
  left: 16px;
  width: 52px;
  height: 52px;
  border: none;
  border-radius: 18px;
  background: linear-gradient(135deg, #d63384, #ff5ba7);
  color: white;
  font-size: 28px;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(214, 51, 132, 0.35);
  z-index: 9999;
}

.side-menu {
  position: fixed;
  top: 0;
  left: -320px;
  width: 280px;

  backdrop-filter: blur(18px);
  box-shadow: 8px 0 30px rgba(0,0,0,0.12);
  transition: left 0.3s ease;
  z-index: 10000;

}

.side-menu.open {

}

.menu-title {
  font-size: 24px;
  font-weight: 800;
  color: #d63384;

}

.menu-item {
  background: linear-gradient(135deg, #ffe6f2, #fff);
  padding: 16px;
  border-radius: 18px;
  margin-bottom: 14px;
  font-weight: 700;
  color: #d63384;
  box-shadow: 0 8px 20px rgba(214,51,132,0.08);

}

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  z-index: 9998;
}

.menu-overlay.show {
  display: block;
}
@keyframes popupIn {
  from {
    transform: scale(0.9);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

.category-title {
  margin: 18px 0 10px;
  font-size: 20px;
  font-weight: 800;
  color: #d63384;
}

#flowerListContainer {
  max-height: 420px;
  overflow-y: auto;
  text-align: left;
  margin-top: 10px;
}

.flower-chip {

  padding: 8px 14px;
  margin: 6px;
  border-radius: 999px;
  background: white;
  border: 1px solid #f2d6e5;
  color: #d63384;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 3px 8px rgba(214,51,132,0.08);
}

.flower-chip:active {
  transform: scale(0.95);
}

</style>
</head>

<body>

<button id="menuBtn" class="menu-btn">☰</button>
<div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>

<div id="sideMenu" class="side-menu">
  <div class="menu-title">🌸 Menu</div>
  <div class="menu-item" onclick="showAllMembers()">
    👥 Tất cả thành viên
  </div>
  <div class="menu-item" onclick="manageMembers()">
    ⚙️ Quản lý thành viên
  </div>
</div>

<h1>🌸 Flower Hội 🌸</h1>

<input id="searchInput" placeholder="🔍 Tìm kiếm hoa">

<div class="dashboard">
  <div class="stat">
    Hội viên
    <b id="totalMembers">0</b>
  </div>
</div>

<input id="flowerName" placeholder="Nhập tên hoa">

<select id="flowerCategory">
  <option value="Phẩm Đỏ">🔴 Phẩm Đỏ</option>
  <option value="Phẩm Vàng">🟡 Phẩm Vàng</option>
  <option value="Phẩm Tím">🟣 Phẩm Tím</option>
  <option value="Phẩm Xanh Dương">🔵 Phẩm Xanh Dương</option>

<input type="file" id="flowerImage" accept="image/*">

  <div class="popup-box">

</div>

<div class="grid" id="flowers"></div>

<div id="categoryPopup" class="popup">
  <div class="popup-box">
    <span class="close-btn" onclick="closeCategoryPopup()">✕</span>
    <h2>🌸 Chọn phẩm</h2>

    <button onclick="setFlowerCategory('Phẩm Đỏ')">🔴 Phẩm Đỏ</button>
    <button onclick="setFlowerCategory('Phẩm Vàng')">🟡 Phẩm Vàng</button>
    <button onclick="setFlowerCategory('Phẩm Tím')">🟣 Phẩm Tím</button>
    <button onclick="setFlowerCategory('Phẩm Xanh Dương')">🔵 Phẩm Xanh Dương</button>
    <button onclick="setFlowerCategory('Phẩm Xanh Lá')">🟢 Phẩm Xanh Lá</button>
  </div>
</div>

<div id="flowerPopup" class="popup">
  <div class="popup-box">
    <span class="close-btn" onclick="closePopup()">✕</span>
    <img id="popupImage" src="">
    <h2 id="popupTitle"></h2>

    <button onclick="joinCurrentFlower()">🌸 Tôi có hoa này</button>
    <button onclick="changeFlowerCategory()">✏️ Chọn phẩm</button>
    <button onclick="leaveCurrentFlower()">❌ Xóa tên tôi</button>
    <button onclick="renameFlower()">✏️ Sửa tên hoa</button>
    <button onclick="deleteFlower()">🗑️ Xóa hoa</button>

    <div id="popupMembers"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc,
  arrayUnion,
  arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCGhFuv8bAVvKxhOQLuTnXQS51x3k0DAM",
  authDomain: "quan-ly-hoa-hoi.firebaseapp.com",
  projectId: "quan-ly-hoa-hoi",
  storageBucket: "quan-ly-hoa-hoi.firebasestorage.app",
  messagingSenderId: "954370139081",
  appId: "1:954370139081:web:1c10ba7d6ff8109c54be18"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const flowers = document.getElementById("flowers");
const searchInput = document.getElementById("searchInput");
const totalMembers = document.getElementById("totalMembers");
const flowerName = document.getElementById("flowerName");
const flowerImage = document.getElementById("flowerImage");
const loading = document.getElementById("loading");
const flowerPopup = document.getElementById("flowerPopup");
const popupImage = document.getElementById("popupImage");
const popupTitle = document.getElementById("popupTitle");
const popupMembers = document.getElementById("popupMembers");
const categoryPopup = document.getElementById("categoryPopup");

const menuBtn = document.getElementById("menuBtn");

const sideMenu = document.getElementById("sideMenu");

const menuOverlay = document.getElementById("menuOverlay");
  
let currentUser = localStorage.getItem("flowerUser");
let selectedFlowerName = null;
let allDocs = [];
let savedScrollY = 0;

menuBtn.onclick = function() {
  sideMenu.classList.add("open");
  menuOverlay.classList.add("show");
};

window.closeMenu = function() {
  sideMenu.classList.remove("open");
  menuOverlay.classList.remove("show");
};

window.showAllMembers = async function() {
  closeMenu();

  const snapshot = await getDocs(collection(db, "flowers"));
  let membersMap = new Map();

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    if (!data.members || !data.name) return;

    data.members.forEach((member) => {
      if (!membersMap.has(member)) {
        membersMap.set(member, []);
      }

      membersMap.get(member).push(data.name);
    });
  });

  let html = "<h2 style='color:#d63384'>👥 Tất cả thành viên</h2>";

  membersMap.forEach((flowers, member) => {
    html += `
      <div style="
        background:white;
        border-radius:18px;
        padding:14px;
        margin-bottom:12px;
        box-shadow:0 6px 16px rgba(214,51,132,0.12);
      ">
        <b>${member}</b><br>
        🌸 ${flowers.join(", ")}
      </div>
    `;
  });

  flowerPopup.innerHTML = `
    <div class="popup-content" style="max-height:80vh;overflow:auto">
      ${html}
      <button onclick="closePopup()">Đóng</button>
    </div>
  `;

  flowerPopup.style.display = "flex";
};

window.manageMembers = async function() {
  closeMenu();

  const snapshot = await getDocs(collection(db, "flowers"));
  let membersSet = new Set();

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    (data.members || []).forEach(member => membersSet.add(member));
  });

  let html = "<h2 style='color:#d63384'>⚙️ Quản lý thành viên</h2>";

  Array.from(membersSet).sort().forEach((member) => {
    html += `
      <div style="
        background:white;
        border-radius:18px;
        padding:14px;
        margin-bottom:12px;
        box-shadow:0 6px 16px rgba(214,51,132,0.12);
        display:flex;
        justify-content:space-between;
        align-items:center;
      ">
        <b>${member}</b>
        <button onclick="deleteMember('${member}')"
          style="
            background:#ff4d6d;
            color:white;
            border:none;
            padding:10px 14px;
            border-radius:12px;
            font-weight:700;
          ">
          Xoá
        </button>
      </div>
    `;
  });

  popupTitle.innerHTML = "⚙️ Quản lý thành viên";
  popupImage.style.display = "none";
  popupMembers.innerHTML = html;
  flowerPopup.style.display = "flex";
};

function normalizeText(text) {
  return (text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
    .replace(/\s+/g, " ");
}

if (!currentUser) {
  currentUser = prompt("Nhập tên hội viên:");
  if (currentUser) {
    localStorage.setItem("flowerUser", currentUser);
  }
}

searchInput.addEventListener("input", loadFlowers);

async function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = 500 / img.width;

      canvas.width = 500;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

async function uploadToCloudinary(file) {
  const compressed = await compressImage(file);

  const formData = new FormData();
  formData.append("file", compressed);
  formData.append("upload_preset", "hoa_upload");

  const response = await fetch(
    "https://api.cloudinary.com/v1_1/dwoznij8g/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await response.json();
  return data.secure_url;
}

window.addFlower = async function () {
  const name = flowerName.value.trim();
  const file = flowerImage.files[0];
  const category = flowerCategory.value;

  if (!name || !file) {
    alert("Nhập tên hoa + chọn ảnh");
    return;
  }

  try {
    loading.style.display = "block";

    const imageUrl = await uploadToCloudinary(file);

    await addDoc(collection(db, "flowers"), {
  name,
  image: imageUrl,
  category,
  members: []
});

    flowerName.value = "";
    flowerImage.value = "";

    await loadFlowers();

  } catch (error) {
    alert("Upload ảnh lỗi");
    console.log(error);

  } finally {
    loading.style.display = "none";
  }
};

window.openPopup = function(data) {
  selectedFlowerName = data.name
    .toLowerCase()
    .trim()
    .replace(/\s+/g, " ");

  popupImage.src = data.image;
  popupTitle.textContent = data.name;

  popupMembers.innerHTML =
    data.members.length
      ? data.members.join(" • ")
      : "Chưa có ai";

  flowerPopup.style.display = "flex";
};

window.closePopup = function() {
  flowerPopup.style.display = "none";

  popupImage.style.display = "block";
  popupTitle.innerHTML = "";
  popupMembers.innerHTML = "";
};
window.openFlowerList = async function() {
  const snapshot = await getDocs(collection(db, "flowers"));

  let groupedFlowers = {
    "Phẩm Đỏ": [],
    "Phẩm Vàng": [],
    "Phẩm Tím": [],
    "Phẩm Xanh Dương": [],
    "Phẩm Xanh Lá": [],
    "Chưa phân loại": []
  };

  let uniqueFlowers = new Map();

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    if (!data.name) return;

    const cleanName = normalizeText(data.name);

    if (!uniqueFlowers.has(cleanName)) {
      uniqueFlowers.set(cleanName, {
        name: data.name.trim(),
        image: data.image,
        members: data.members || [],
        category: data.category || "Chưa phân loại"
      });
    }
  });

  flowerListContainer.innerHTML = "";

  uniqueFlowers.forEach((flower) => {
    const category = groupedFlowers[flower.category]
      ? flower.category
      : "Chưa phân loại";

    groupedFlowers[category].push(flower);
  });

  const categoryOrder = [
  "Phẩm Đỏ",
  "Phẩm Vàng",
  "Phẩm Tím",
  "Phẩm Xanh Dương",
  "Phẩm Xanh Lá",
  "Chưa phân loại"
];

categoryOrder.forEach((group) => {
  const flowers = groupedFlowers[group];

  if (!flowers.length) return;

  flowers.sort((a, b) =>
    a.name.localeCompare(b.name, "vi")
  );

    const section = document.createElement("div");
    section.style.marginBottom = "16px";

    const title = document.createElement("h3");
    title.textContent = group;
    title.style.color = "#d63384";

    section.appendChild(title);

    flowers.forEach((flower) => {
      const chip = document.createElement("span");
      chip.className = "flower-chip";
      chip.textContent = flower.name;

      chip.onclick = () => {
        closeFlowerList();
        openPopup(flower);
      };

      section.appendChild(chip);
    });

    flowerListContainer.appendChild(section);
  });

  flowerListPopup.style.display = "flex";
};

window.closeFlowerList = function() {
  flowerListPopup.style.display = "none";
};

window.joinCurrentFlower = async function() {
  const docsToUpdate = allDocs.filter(d => {
    const name = d.data().name
      ?.toLowerCase()
      .trim()
      .replace(/\s+/g, " ");

    return name === selectedFlowerName;
  });

  for (const d of docsToUpdate) {
    await updateDoc(doc(db, "flowers", d.id), {
      members: arrayUnion(currentUser)
    });
  }

  closePopup();
  await loadFlowersSilently();
};

window.changeFlowerCategory = function() {
  categoryPopup.style.display = "flex";
};

window.closeCategoryPopup = function() {
  categoryPopup.style.display = "none";
};

window.setFlowerCategory = async function(category) {
  const docsToUpdate = allDocs.filter(d => {
    const name = d.data().name
      ?.toLowerCase()
      .trim()
      .replace(/\s+/g, " ");

    return name === selectedFlowerName;
  });

  for (const d of docsToUpdate) {
    await updateDoc(doc(db, "flowers", d.id), {
      category
    });
  }

  closeCategoryPopup();
  closePopup();
  await loadFlowersSilently();
};

window.renameFlower = async function() {
  const newName = prompt("Tên hoa mới:");

  if (!newName) return;

  const docsToUpdate = allDocs.filter(d => {
    const name = normalizeText(d.data().name);
    return name === selectedFlowerName;
  });

  for (const d of docsToUpdate) {
    await updateDoc(doc(db, "flowers", d.id), {
      name: newName
    });
  }

  closePopup();
  await loadFlowersSilently();
};

window.deleteFlower = async function() {
  const ok = confirm("Xóa hoa này?");

  if (!ok) return;

  const docsToDelete = allDocs.filter(d => {
    const name = normalizeText(d.data().name);
    return name === selectedFlowerName;
  });

  for (const d of docsToDelete) {
    await deleteDoc(doc(db, "flowers", d.id));
  }

  closePopup();
  await loadFlowersSilently();
};

window.leaveCurrentFlower = async function() {
  const docsToUpdate = allDocs.filter(d => {
    const name = normalizeText(d.data().name);
    return name === selectedFlowerName;
  });

  for (const d of docsToUpdate) {
    await updateDoc(doc(db, "flowers", d.id), {
      members: arrayRemove(currentUser)
    });
  }

  closePopup();
  await loadFlowersSilently();
};

async function loadFlowers() {
  flowers.innerHTML = "";

  const search = normalizeText(searchInput.value);

  const snapshot = await getDocs(collection(db, "flowers"));
  allDocs = snapshot.docs;

  let allMembers = new Set();
  let flowerGroups = new Map();

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    if (!data.name) return;

    const cleanName = normalizeText(data.name);

    if (search && !cleanName.includes(search)) return;

    if (!flowerGroups.has(cleanName)) {
      flowerGroups.set(cleanName, {
        name: data.name.trim(),
        image: data.image,
        category: data.category || "Chưa phân loại",
        members: new Set()
      });
    }

    const flower = flowerGroups.get(cleanName);

    (data.members || []).forEach((member) => {
      flower.members.add(member);
      allMembers.add(member);
    });
  });
  
const categoryOrder = [
  "Phẩm Đỏ",
  "Phẩm Vàng",
  "Phẩm Tím",
  "Phẩm Xanh Dương",
  "Phẩm Xanh Lá",
  "Chưa phân loại"
];

const categoryEmoji = {
  "Phẩm Đỏ": "🔴",
  "Phẩm Vàng": "🟡",
  "Phẩm Tím": "🟣",
  "Phẩm Xanh Dương": "🔵",
  "Phẩm Xanh Lá": "🟢",
  "Chưa phân loại": "⚪"
};

let groupedByCategory = {
  "Phẩm Đỏ": [],
  "Phẩm Vàng": [],
  "Phẩm Tím": [],
  "Phẩm Xanh Dương": [],
  "Phẩm Xanh Lá": [],
  "Chưa phân loại": []
};

Array.from(flowerGroups.values()).forEach((flower) => {
  const category = groupedByCategory[flower.category]
    ? flower.category
    : "Chưa phân loại";

  groupedByCategory[category].push(flower);
});

categoryOrder.forEach((category) => {
  const list = groupedByCategory[category];

  if (!list.length) return;

  list.sort((a, b) => a.name.localeCompare(b.name, "vi"));

  const title = document.createElement("h2");
  title.className = "category-title";
  title.textContent = `${categoryEmoji[category]} ${category}`;

  flowers.appendChild(title);

  const categoryGrid = document.createElement("div");
  categoryGrid.className = "grid";

  list.forEach((flower) => {
    const div = document.createElement("div");
    div.className = "flower-card";

    div.onclick = () =>
      openPopup({
        name: flower.name,
        image: flower.image,
        members: Array.from(flower.members)
      });

    div.innerHTML = `
  <img src="${flower.image}">
  <h3>${flower.name}</h3>
  <div class="flower-count">👥 ${flower.members.size}</div>
`;

    categoryGrid.appendChild(div);
  });

  flowers.appendChild(categoryGrid);
});

totalMembers.textContent = allMembers.size;
}

async function loadFlowersSilently() {
  const currentY = window.scrollY;
  await loadFlowers();
  window.scrollTo(0, currentY);
}

let touchStartY = 0;

document.addEventListener("touchstart", (e) => {
  touchStartY = e.touches[0].clientY;
});

document.addEventListener("touchend", async (e) => {
  const touchEndY = e.changedTouches[0].clientY;

  if (window.scrollY === 0 && touchEndY - touchStartY > 120) {
    await loadFlowers();
  }
});

loadFlowers();
</script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(() => console.log("PWA ready"))
      .catch(err => console.log(err));
  });
}
</script>
