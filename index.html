<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d63384">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FLOWER">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌸 Flower Hội </title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #fff7fb, #ffeaf4);
  margin: 0;
  padding: 12px;
}

h1 {
  text-align: center;
  color: #d63384;
  font-size: 24px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  box-sizing: border-box;
  font-size: 16px;
}

button {
  background: #d63384;
  color: white;
  border: none;
  font-weight: bold;
}

.dashboard {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}

.stat {
  width: 180px;
  background: white;
  padding: 10px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.stat b {
  display: block;
  color: #d63384;
  font-size: 18px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.flower-card {
  background: white;
  border-radius: 16px;
  padding: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  cursor: pointer;
}

.flower-card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 12px;
}

.flower-card h3 {
  text-align: center;
  color: #d63384;
  font-size: 15px;
  margin: 8px 0 0;
}

.loading {
  text-align: center;
  color: #d63384;
  display: none;
}

.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 999;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.popup-box {
  background: white;
  width: 100%;
  max-width: 380px;
  border-radius: 22px;
  padding: 20px;
  position: relative;
  animation: popupIn 0.25s ease;
}

.popup-box img {
  width: 100%;
  border-radius: 16px;
  max-height: 220px;
  object-fit: cover;
}

.popup-box h2 {
  text-align: center;
  color: #d63384;
}

.close-btn {
  position: absolute;
  right: 16px;
  top: 12px;
  font-size: 22px;
  cursor: pointer;
}

#popupMembers {
  margin-top: 14px;
  line-height: 1.7;
  color: #444;
  text-align: center;
}

@keyframes popupIn {
  from {
    transform: scale(0.92);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}
</style>
</head>
<body>

<h1>🌸 FLOWER Dashboard 🌸</h1>

<input id="searchInput" placeholder="🔍 Tìm kiếm hoa hoặc hội viên">

<div class="dashboard">
  <div class="stat">Hội viên<b id="totalMembers">0</b></div>
</div>

<input id="flowerName" placeholder="Nhập tên hoa">
<input type="file" id="flowerImage" accept="image/*">
<button onclick="addFlower()">➕ Thêm loại hoa</button>

<div class="loading" id="loading">⏳ Đang tải ảnh...</div>

<div class="grid" id="flowers"></div>

<div id="flowerPopup" class="popup">
  <div class="popup-box">
    <span class="close-btn" onclick="closePopup()">✕</span>
    <img id="popupImage" src="">
    <h2 id="popupTitle"></h2>

    <button onclick="joinCurrentFlower()">🌸 Tôi có hoa này</button>
    <button onclick="leaveCurrentFlower()">❌ Xóa tên tôi</button>

    <div id="popupMembers"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  arrayUnion,
  arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCGhFuv8bAVvKxhOQLuTnXQS51x3k0DAM",
  authDomain: "quan-ly-hoa-hoi.firebaseapp.com",
  projectId: "quan-ly-hoa-hoi",
  storageBucket: "quan-ly-hoa-hoi.firebasestorage.app",
  messagingSenderId: "954370139081",
  appId: "1:954370139081:web:1c10ba7d6ff8109c54be18"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = localStorage.getItem("flowerUser");
let selectedFlowerId = null;

if (!currentUser) {
  currentUser = prompt("Nhập tên hội viên:");
  if (currentUser) {
    localStorage.setItem("flowerUser", currentUser);
  }
}

document.getElementById("searchInput").addEventListener("input", loadFlowers);

async function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = 500 / img.width;

      canvas.width = 500;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}

async function uploadToCloudinary(file) {
  const compressed = await compressImage(file);

  const formData = new FormData();
  formData.append("file", compressed);
  formData.append("upload_preset", "hoa_upload");

  const response = await fetch(
    "https://api.cloudinary.com/v1_1/dwoznij8g/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await response.json();
  return data.secure_url;
}

window.addFlower = async function () {
  const name = flowerName.value.trim();
  const file = flowerImage.files[0];

  if (!name || !file) {
    alert("Nhập tên hoa + chọn ảnh");
    return;
  }

  loading.style.display = "block";

  const imageUrl = await uploadToCloudinary(file);

  await addDoc(collection(db, "flowers"), {
    name,
    image: imageUrl,
    members: []
  });

  flowerName.value = "";
  flowerImage.value = "";
  loading.style.display = "none";

  loadFlowers();
};

window.openPopup = function(id, data) {
  selectedFlowerId = id;

  popupImage.src = data.image;
  popupTitle.textContent = data.name;
  popupMembers.innerHTML =
    (data.members || []).join(" • ") || "Chưa có ai";

  flowerPopup.style.display = "flex";
};

window.closePopup = function() {
  flowerPopup.style.display = "none";
};

window.joinCurrentFlower = async function() {
  await updateDoc(doc(db, "flowers", selectedFlowerId), {
    members: arrayUnion(currentUser)
  });

  closePopup();
  loadFlowers();
};

window.leaveCurrentFlower = async function() {
  await updateDoc(doc(db, "flowers", selectedFlowerId), {
    members: arrayRemove(currentUser)
  });

  closePopup();
  loadFlowers();
};

async function loadFlowers() {
  flowers.innerHTML = "";

  const search = searchInput.value.toLowerCase().trim();
  const snapshot = await getDocs(collection(db, "flowers"));

  let allMembers = new Set();

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    const memberMatch = (data.members || []).some(member =>
      member.toLowerCase().includes(search)
    );

    if (
      search &&
      !data.name.toLowerCase().includes(search) &&
      !memberMatch
    ) return;

    (data.members || []).forEach(m => allMembers.add(m));

    const div = document.createElement("div");
    div.className = "flower-card";
    div.onclick = () => openPopup(docSnap.id, data);

    div.innerHTML = `
      <img src="${data.image}">
      <h3>${data.name}</h3>
    `;

    flowers.appendChild(div);
  });

  totalMembers.textContent = allMembers.size;
}

loadFlowers();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(() => console.log("PWA ready"))
      .catch(err => console.log(err));
  });
}
</script>

</body>
</html>
